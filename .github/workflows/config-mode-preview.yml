name: Config-mode preview

on:
  push:
    paths:
      - 'package/gluon-config-mode-*/**'
      - 'package/gluon-web-model/**'
      - 'contrib/config-mode-preview/**'
      - '.github/workflows/config-mode-preview.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'package/gluon-config-mode-*/**'
      - 'package/gluon-web-model/**'
      - 'contrib/config-mode-preview/**'
      - '.github/workflows/config-mode-preview.yml'
  workflow_dispatch:

permissions:
  contents: read

# Allow one concurrent deployment, don't cancel in-progress production deploys.
concurrency:
  group: config-mode-preview
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - name: Build preview
        run: contrib/config-mode-preview/build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: config-mode-preview
          path: contrib/config-mode-preview/out
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: contrib/config-mode-preview/out

  # Deploy to GitHub Pages on pushes to the default branch (and manual runs).
  deploy:
    name: deploy
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
